<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Plain View</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="popup-header">
    <span class="popup-logo">⬡</span>
    <span class="popup-title">Plain View</span>
    <span class="popup-version">v0.1</span>
  </header>

  <div class="popup-status" id="status-area">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Detecting…</span>
  </div>

  <section class="popup-section">
    <div class="section-label">Theme</div>
    <div class="theme-grid" id="theme-grid">
      <!-- Populated by popup.ts -->
    </div>
  </section>

  <section class="popup-section">
    <div class="section-label">Enabled formats</div>
    <div id="format-toggles">
      <!-- Populated by popup.ts -->
    </div>
  </section>

  <section class="popup-section">
    <div class="section-label">Host settings</div>

    <div class="format-row">
      <span class="format-name">Local files only</span>
      <label class="toggle-switch">
        <input type="checkbox" id="local-only-toggle">
        <span class="toggle-track"></span>
      </label>
    </div>

    <div class="host-list-row">
      <div class="host-list-label">Disabled hosts (one per line)</div>
      <textarea id="disabled-hosts" rows="3" placeholder="example.com&#10;*.github.com"></textarea>
    </div>
  </section>

  <script type="module" src="dist/popup/popup.js"></script>
</body>
</html>
